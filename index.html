<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All-Moduli Neuron View &mdash; Llama-3.1-8B</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  color: #333;
  background: #fafaf8;
  line-height: 1.6;
}

h1 { font-size: 1.6rem; font-weight: normal; margin-bottom: 0.25rem; }
.subtitle { color: #666; font-size: 1rem; margin-bottom: 1.25rem; }

/* Controls */
.controls {
  display: flex;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 1rem;
  padding: 0.8rem 1rem;
  background: #f0efeb;
  border-radius: 6px;
}
.control-group { display: flex; align-items: center; gap: 0.4rem; }
.control-group label { font-size: 0.85rem; color: #555; white-space: nowrap; }
select {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.3rem 0.6rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
}

/* Prompt display */
.prompt-display {
  margin-bottom: 1rem;
  padding: 0.75rem 1rem;
  background: #f5f5f0;
  border-left: 3px solid #8b7355;
  border-radius: 0 4px 4px 0;
}
.prompt-display .prompt-text {
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 0.88rem;
  white-space: pre-wrap;
  margin-bottom: 0.3rem;
  color: #333;
}
.prompt-display .prompt-meta {
  font-size: 0.8rem;
  color: #777;
}
.prompt-display .prompt-meta strong { color: #555; }

/* Circles section title */
.circles-title {
  font-size: 1.05rem;
  font-weight: normal;
  color: #444;
  text-align: center;
  margin-top: 1.75rem;
  margin-bottom: 0.35rem;
  border-bottom: 1px solid #e4e1d8;
  padding-bottom: 0.4rem;
}
.circles-legend {
  font-size: 0.8rem;
  font-style: italic;
  color: #999;
  text-align: center;
  margin-bottom: 0.75rem;
}

/* Circles grid — 3×2 layout so each circle has breathing room */
.circles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem 0.6rem;
  margin: 1.25rem 0 0.5rem;
}
.circle-cell { text-align: center; min-width: 0; }
.circle-cell h4 {
  font-size: 0.75rem;
  font-weight: normal;
  color: #666;
  margin-bottom: 0.05rem;
  font-family: 'Menlo', 'Consolas', monospace;
}
.circle-cell .circle-residue {
  font-size: 0.7rem;
  color: #999;
  margin-bottom: 0.15rem;
  font-family: 'Menlo', 'Consolas', monospace;
}
.circle-cell .circle-residue strong { color: #444; }
.circle-cell svg {
  width: 100%;
  height: auto;
  display: block;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 5px 9px;
  border-radius: 4px;
  font-size: 0.78rem;
  font-family: 'Menlo', 'Consolas', monospace;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
  display: none;
}

/* Heatmap section (shown after neuron selection) */
.heatmap-section-wrapper {
  display: none;
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid #e4e1d8;
}
.heatmap-section-wrapper.visible { display: block; }
.selected-neuron-header {
  font-size: 0.95rem;
  color: #444;
  margin-bottom: 0.75rem;
}
.selected-neuron-header strong { color: #222; }
.selected-neuron-header .deselect {
  font-size: 0.8rem;
  color: #888;
  font-style: italic;
  margin-left: 0.5rem;
}

/* Reused heatmap styles from demo_draft1 */
.axis-label-x, .axis-label-y { font-size: 0.7rem; fill: #555; }
.axis-title { font-size: 0.8rem; fill: #444; font-style: italic; }
.heatmap-section { margin-bottom: 1.25rem; }
#heatmap-combined { display: flex; justify-content: center; }
.heatmap-section-title {
  font-size: 0.9rem;
  color: #555;
  font-style: italic;
  margin-bottom: 0.3rem;
  text-align: center;
}

/* Gate above Up */
.secondary-heatmaps { margin-top: 1.25rem; }
.secondary-grid {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-top: 0.5rem;
  align-items: center;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 180px;
  color: #999;
  font-style: italic;
}

/* Responsive */
@media (max-width: 620px) {
  body { padding: 0.75rem 0.75rem 2rem; }
  h1 { font-size: 1.3rem; }
  .circles-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  .controls { gap: 0.6rem; padding: 0.6rem 0.75rem; }
  .control-group { flex: 1; }
  .control-group select { flex: 1; min-width: 0; }
  .secondary-grid { gap: 0.75rem; }
}
</style>
</head>
<body>

<h1>Addition Neurons in a Real Forward Pass</h1>
<p class="subtitle">Llama-3.1-8B &middot; Layer 18 &middot; MLP Neuron Activations</p>

<div class="controls">
  <div class="control-group">
    <label for="task-select">Task</label>
    <select id="task-select"></select>
  </div>
  <div class="control-group">
    <label for="inp-select">Input</label>
    <select id="inp-select"></select>
  </div>
  <div class="control-group">
    <label for="num-select">Number</label>
    <select id="num-select"></select>
  </div>
</div>

<div class="prompt-display" id="prompt-display">
  <div class="prompt-text" id="prompt-text"></div>
  <div class="prompt-meta" id="prompt-meta"></div>
</div>

<h2 class="circles-title">Neuron Outputs in Each Fourier Subspace for This Prompt</h2>
<div class="circles-legend">Stars: Ground Truth Answer &middot; Dashed Lines: Sum of Neuron Outputs</div>
<div class="circles-grid" id="circles-grid">
  <div class="loading" style="grid-column: 1 / -1">Loading data&hellip;</div>
</div>

<div class="heatmap-section-wrapper" id="heatmap-wrapper">
  <div class="selected-neuron-header" id="selected-neuron-header"></div>
  <div id="heatmap-combined"></div>
  <div class="secondary-heatmaps">
    <div class="secondary-grid">
      <div id="heatmap-gate"></div>
      <div id="heatmap-up"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── State ──
const state = {
  task: "months",
  row: 0,
  col: 0,
  selectedNeuron: null,
  selectedMod: null,
  taskDataCache: {},
  neuronsData: null,
};

const MOD_ORDER = ["mod_2", "mod_5", "mod_10", "mod_20", "mod_50", "mod_100"];
const isTouch = window.matchMedia("(hover: none)").matches;

// Per-task default prompt + preselected neuron shown on first load / task-switch.
const TASK_DEFAULTS = {
  months: { row: 3, col: 3, selectedNeuron: 12728, selectedMod: "mod_5" }, // April + four
  addition: { row: 14, col: 20, selectedNeuron: 1448, selectedMod: "mod_50" }, // 15 + 21
};
function applyTaskDefaults(task) {
  const d = TASK_DEFAULTS[task] || { row: 0, col: 0, selectedNeuron: null, selectedMod: null };
  state.row = d.row;
  state.col = d.col;
  state.selectedNeuron = d.selectedNeuron;
  state.selectedMod = d.selectedMod;
}

// ── Data loading ──
async function loadNeuronsData() {
  const resp = await fetch("data/neurons.json");
  state.neuronsData = await resp.json();
}

async function loadTaskData(task) {
  if (state.taskDataCache[task]) return state.taskDataCache[task];
  const resp = await fetch(`data/${task}.json`);
  const data = await resp.json();
  state.taskDataCache[task] = data;
  return data;
}

// ── Word-to-number parser ──
const _ones = {one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9};
const _teens = {ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19};
const _tens = {twenty:20,thirty:30,forty:40,fifty:50};

function parseNum(s) {
  const n = parseInt(s);
  if (!isNaN(n)) return n;
  if (_ones[s]) return _ones[s];
  if (_teens[s]) return _teens[s];
  if (_tens[s]) return _tens[s];
  const parts = s.split('-');
  if (parts.length === 2) return (_tens[parts[0]] || 0) + (_ones[parts[1]] || 0);
  return NaN;
}

// ── Answer for a cell ──
function getAnswer(row, col) {
  const taskData = state.taskDataCache[state.task];
  const inps = taskData.inps;
  const nums = taskData.nums;
  const task = state.task;
  const numVal = parseNum(nums[col]);
  let inpNum, sum, answerLabel;

  if (task === "months") {
    inpNum = row + 1;
    sum = inpNum + numVal;
    answerLabel = inps[(row + numVal) % 12];
  } else if (task === "weekdays") {
    inpNum = row + 1;
    sum = inpNum + numVal;
    answerLabel = inps[(row + numVal) % 7];
  } else if (task === "hours") {
    inpNum = parseInt(inps[row]);
    sum = inpNum + numVal;
    answerLabel = String(sum % 24).padStart(2, '0') + ":00";
  } else { // addition
    inpNum = parseInt(inps[row]);
    sum = inpNum + numVal;
    answerLabel = String(sum);
  }

  return { answerLabel, inpNum, numVal, sum };
}

// ── Populate dropdowns ──
function populateTaskDropdown() {
  const taskSel = document.getElementById("task-select");
  taskSel.innerHTML = "";
  state.neuronsData.tasks.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
    if (t === state.task) opt.selected = true;
    taskSel.appendChild(opt);
  });
}

function populatePromptDropdowns() {
  const taskData = state.taskDataCache[state.task];
  const inpSel = document.getElementById("inp-select");
  const numSel = document.getElementById("num-select");
  inpSel.innerHTML = "";
  numSel.innerHTML = "";

  taskData.inps.forEach((v, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v;
    if (i === state.row) opt.selected = true;
    inpSel.appendChild(opt);
  });
  taskData.nums.forEach((v, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v;
    if (i === state.col) opt.selected = true;
    numSel.appendChild(opt);
  });
}

// ── Prompt display ──
function updatePromptDisplay() {
  const taskData = state.taskDataCache[state.task];
  const inp = taskData.inps[state.row];
  const num = taskData.nums[state.col];
  const template = state.neuronsData.templates[state.task];
  const prompt = template.replace("{input}", inp).replace("{number}", num);
  const answer = getAnswer(state.row, state.col);

  document.getElementById("prompt-text").textContent = prompt + " " + answer.answerLabel;
  document.getElementById("prompt-meta").innerHTML =
    `${inp} + ${num} = <strong>${answer.sum}</strong>`;
}

// ── Circle rendering ──
const CIRCLE_SIZE = 200;
const CIRCLE_MARGIN = 18;
const CIRCLE_REF_RADIUS = (CIRCLE_SIZE - 2 * CIRCLE_MARGIN) / 2 * 0.85;
const neuronColors = d3.schemeTableau10;

function renderCircleForMod(svgEl, modKey) {
  const svg = d3.select(svgEl);
  svg.selectAll("*").remove();
  svg.attr("viewBox", `0 0 ${CIRCLE_SIZE} ${CIRCLE_SIZE}`)
     .attr("preserveAspectRatio", "xMidYMid meet");

  const nd = state.neuronsData;
  const taskData = state.taskDataCache[state.task];
  const T = parseInt(modKey.split("_")[1]);
  const groupNeurons = nd.neurons_by_modulo[modKey] || [];
  const downproj = nd.downproj[modKey] || {};

  const cx = CIRCLE_SIZE / 2;
  const cy = CIRCLE_SIZE / 2;
  const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

  // Probe axes (drawn behind the unit circle so arrows sit on top).
  // Labels appear only on hover over the axis line.
  const axisExt = CIRCLE_REF_RADIUS + 28;
  const axisEntries = [
    {
      x1: -axisExt, y1: 0, x2: axisExt, y2: 0,
      labelX: axisExt - 1, labelY: 8, anchor: "end", text: "cosine probe",
    },
    {
      x1: 0, y1: -axisExt, x2: 0, y2: axisExt,
      labelX: 3, labelY: -axisExt + 2, anchor: "start", text: "sine probe",
    },
  ];
  axisEntries.forEach(a => {
    g.append("line")
      .attr("x1", a.x1).attr("y1", a.y1).attr("x2", a.x2).attr("y2", a.y2)
      .attr("stroke", "#ececec").attr("stroke-width", 0.8);
    const hit = g.append("line")
      .attr("x1", a.x1).attr("y1", a.y1).attr("x2", a.x2).attr("y2", a.y2)
      .attr("stroke", "transparent").attr("stroke-width", 10)
      .style("cursor", "help");
    let label = null;
    hit.on("mouseenter", () => {
      label = g.append("text")
        .attr("class", "axis-hover-label")
        .attr("x", a.labelX).attr("y", a.labelY)
        .attr("text-anchor", a.anchor)
        .attr("font-size", "7.5px")
        .attr("font-style", "italic")
        .attr("fill", "#888")
        .attr("pointer-events", "none")
        .text(a.text);
    });
    hit.on("mouseleave", () => {
      if (label) { label.remove(); label = null; }
    });
  });

  // Reference unit circle
  g.append("circle")
    .attr("r", CIRCLE_REF_RADIUS)
    .attr("fill", "none")
    .attr("stroke", "#ddd")
    .attr("stroke-width", 1);

  // Residue markers; labels at spaced intervals for large T.
  const markerR = T > 20 ? 1.2 : 2.2;
  function showLabel(r) {
    if (T <= 10) return true;
    if (T === 20) return r % 2 === 0;   // every even number
    if (T === 50) return r % 5 === 0;   // count by 5
    if (T === 100) return r % 10 === 0; // count by 10
    return r === 0;
  }
  for (let r = 0; r < T; r++) {
    const angle = (2 * Math.PI * r) / T;
    const mx = CIRCLE_REF_RADIUS * Math.cos(angle);
    const my = -CIRCLE_REF_RADIUS * Math.sin(angle);
    g.append("circle")
      .attr("cx", mx).attr("cy", my)
      .attr("r", markerR)
      .attr("fill", "#bbb")
      .attr("stroke", "#999")
      .attr("stroke-width", 0.4);
    if (showLabel(r)) {
      const labelR = CIRCLE_REF_RADIUS + 11;
      g.append("text")
        .attr("x", labelR * Math.cos(angle))
        .attr("y", -labelR * Math.sin(angle))
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("font-size", "10.5px")
        .attr("fill", "#888")
        .text(r);
    }
  }

  // Answer star
  const answer = getAnswer(state.row, state.col);
  const residue = answer.sum % T;
  const starAngle = (2 * Math.PI * residue) / T;
  const starX = CIRCLE_REF_RADIUS * Math.cos(starAngle);
  const starY = -CIRCLE_REF_RADIUS * Math.sin(starAngle);
  const sr = 4.5;
  let starPath = "";
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + (Math.PI * i / 5);
    const rd = i % 2 === 0 ? sr : sr * 0.4;
    const px = starX + rd * Math.cos(a);
    const py = starY + rd * Math.sin(a);
    starPath += (i === 0 ? "M" : "L") + px + "," + py;
  }
  starPath += "Z";
  g.append("path")
    .attr("d", starPath)
    .attr("fill", "#999")
    .attr("stroke", "#666")
    .attr("stroke-width", 0.4);

  // Arrow-head marker defs
  const defs = svg.append("defs");
  neuronColors.forEach((color, i) => {
    defs.append("marker")
      .attr("id", `arrowhead-${modKey}-${i}`)
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 8).attr("refY", 5)
      .attr("markerWidth", 3.5).attr("markerHeight", 3.5)
      .attr("orient", "auto-start-reverse")
      .append("path")
      .attr("d", "M 0 0 L 10 5 L 0 10 z")
      .attr("fill", color);
  });

  // Gather and draw arrows
  const vectors = [];
  let sumC = 0, sumS = 0;
  groupNeurons.forEach((nid, idx) => {
    const coords = downproj[String(nid)];
    if (!coords) return;
    const [c, s] = coords;
    const neuronActs = taskData.neurons[String(nid)];
    const activation = neuronActs ? neuronActs.both[state.row][state.col] : 0;
    const sc = c * activation;
    const ss = s * activation;
    sumC += sc;
    sumS += ss;
    vectors.push({ nid, sc, ss, activation, idx, mag: Math.sqrt(sc * sc + ss * ss) });
  });

  // Draw lowest-magnitude first so largest arrows are on top for click hit-lines
  vectors.sort((a, b) => a.mag - b.mag);

  const scale = CIRCLE_REF_RADIUS;
  const isNeuronSelectedInThis = state.selectedNeuron !== null && state.selectedMod === modKey;

  vectors.forEach(v => {
    if (v.mag < 1e-6) return;
    const ex = v.sc * scale;
    const ey = -v.ss * scale;
    const color = neuronColors[v.idx % neuronColors.length];
    const isSelected = v.nid === state.selectedNeuron;
    const isDimmed = isNeuronSelectedInThis && !isSelected;
    const strokeW = isSelected ? 2.2 : 1.1;
    const opacity = isDimmed ? 0.2 : (isSelected ? 1.0 : 0.75);

    const arrow = g.append("line")
      .attr("class", `arrow arrow-${v.nid}`)
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", ex).attr("y2", ey)
      .attr("stroke", color)
      .attr("stroke-width", strokeW)
      .attr("opacity", opacity)
      .attr("marker-end", `url(#arrowhead-${modKey}-${v.idx % neuronColors.length})`);

    // Transparent hit-line for hover/click
    const hit = g.append("line")
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", ex).attr("y2", ey)
      .attr("stroke", "transparent")
      .attr("stroke-width", 14)
      .style("cursor", "pointer");

    hit.on("mouseenter", (event) => {
      // Bold this arrow, dim siblings in the same circle
      arrow.attr("stroke-width", 2.5).attr("opacity", 1.0);
      g.selectAll(".arrow").each(function() {
        const el = d3.select(this);
        if (!el.classed(`arrow-${v.nid}`)) {
          el.attr("opacity", 0.18);
        }
      });
      // Tooltip
      const tip = document.getElementById("tooltip");
      tip.innerHTML = `<b>Neuron ${v.nid}</b> &middot; Period ${modKey.replace("mod_", " ")}<br>act: ${v.activation.toFixed(3)}`;
      tip.style.left = (event.pageX + 14) + "px";
      tip.style.top = (event.pageY - 36) + "px";
      tip.style.display = "block";
    });

    hit.on("mousemove", (event) => {
      const tip = document.getElementById("tooltip");
      tip.style.left = (event.pageX + 14) + "px";
      tip.style.top = (event.pageY - 36) + "px";
    });

    hit.on("mouseleave", () => {
      document.getElementById("tooltip").style.display = "none";
      // Rerender this circle to reset styles based on current state
      renderCircleForMod(svgEl, modKey);
    });

    hit.on("click", (event) => {
      event.stopPropagation();
      toggleNeuronSelection(v.nid, modKey);
    });
  });

  // Sum vector (dashed)
  const sumEx = sumC * scale;
  const sumEy = -sumS * scale;
  if (Math.abs(sumC) > 1e-6 || Math.abs(sumS) > 1e-6) {
    g.append("line")
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", sumEx).attr("y2", sumEy)
      .attr("stroke", "#333")
      .attr("stroke-width", 1.4)
      .attr("stroke-dasharray", "3,2")
      .attr("opacity", 0.7)
      .style("pointer-events", "none");
  }
}

function renderAllCircles() {
  const grid = document.getElementById("circles-grid");
  grid.innerHTML = "";
  const answer = state.taskDataCache[state.task] ? getAnswer(state.row, state.col) : null;
  MOD_ORDER.forEach(modKey => {
    const T = parseInt(modKey.split("_")[1]);
    const cell = document.createElement("div");
    cell.className = "circle-cell";
    const title = document.createElement("h4");
    title.textContent = `T = ${T}`;
    cell.appendChild(title);
    if (answer) {
      const sub = document.createElement("div");
      sub.className = "circle-residue";
      sub.innerHTML = `${answer.sum} mod ${T} = <strong>${answer.sum % T}</strong>`;
      cell.appendChild(sub);
    }
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    cell.appendChild(svg);
    grid.appendChild(cell);
    renderCircleForMod(svg, modKey);
  });
}

// ── Neuron selection / heatmap section ──
function toggleNeuronSelection(nid, modKey) {
  if (state.selectedNeuron === nid) {
    state.selectedNeuron = null;
    state.selectedMod = null;
  } else {
    state.selectedNeuron = nid;
    state.selectedMod = modKey;
  }
  renderAllCircles();
  renderHeatmapSection();
}

function renderHeatmapSection() {
  const wrapper = document.getElementById("heatmap-wrapper");
  if (state.selectedNeuron === null) {
    wrapper.classList.remove("visible");
    document.getElementById("heatmap-combined").innerHTML = "";
    document.getElementById("heatmap-gate").innerHTML = "";
    document.getElementById("heatmap-up").innerHTML = "";
    return;
  }
  wrapper.classList.add("visible");

  const header = document.getElementById("selected-neuron-header");
  header.innerHTML =
    `Neuron <strong>${state.selectedNeuron}</strong> &middot; Period ${state.selectedMod.replace("mod_", " ")} &middot; Activations Across All Prompts` +
    `<span class="deselect">click on an arrow above to select another neuron</span>`;

  const combined = document.getElementById("heatmap-combined");
  const gate = document.getElementById("heatmap-gate");
  const up = document.getElementById("heatmap-up");
  combined.innerHTML = "";
  gate.innerHTML = "";
  up.innerHTML = "";

  const primaryW = Math.min(640, availableWidth(combined));
  renderOneHeatmap(combined, "both", null, primaryW);

  renderOneHeatmap(gate, "gate", "Gate Activations", primaryW);
  renderOneHeatmap(up, "up", "Up Activations", primaryW);
}

// ── Heatmap rendering (ported read-only from demo_draft1) ──
function computeMargin(maxW) {
  return maxW < 500
    ? { top: 8, right: 8, bottom: 50, left: 40 }
    : { top: 10, right: 10, bottom: 60, left: 80 };
}
const maxCanvasH = 500;

function getColorScale(actType, data2d) {
  // All three heatmaps use matplotlib's RdBu_r: blue=negative, red=positive.
  // d3.interpolateRdBu is red→blue, so invert t to get the reversed direction.
  const flat = data2d.flat();
  const maxAbs = d3.max(flat, d => Math.abs(d));
  const bound = Math.max(maxAbs, 0.1);
  return d3.scaleDiverging(t => d3.interpolateRdBu(1 - t)).domain([-bound, 0, bound]);
}

function availableWidth(el) {
  const w = el && el.clientWidth;
  return w && w > 0 ? w : Math.max(260, window.innerWidth - 32);
}

function renderOneHeatmap(parentEl, key, label, maxW) {
  const taskData = state.taskDataCache[state.task];
  if (!taskData) return;
  const neuronData = taskData.neurons[String(state.selectedNeuron)];
  if (!neuronData) return;

  const grid = neuronData[key];
  const nRows = grid.length;
  const nCols = grid[0].length;
  const inps = taskData.inps;
  const nums = taskData.nums;
  const margin = computeMargin(maxW);

  const section = document.createElement("div");
  section.className = "heatmap-section";

  if (label) {
    const title = document.createElement("div");
    title.className = "heatmap-section-title";
    title.textContent = label;
    title.style.paddingLeft = margin.left + "px";
    title.style.paddingRight = margin.right + "px";
    section.appendChild(title);
  }

  const maxCellW = Math.floor((maxW - margin.left - margin.right) / nCols);
  const maxCellH = Math.floor((maxCanvasH - margin.top - margin.bottom) / nRows);
  const cellSize = Math.max(3, Math.min(maxCellW, maxCellH, 40));
  const plotW = cellSize * nCols;
  const plotH = cellSize * nRows;
  const totalW = plotW + margin.left + margin.right;
  const totalH = plotH + margin.top + margin.bottom;

  const wrapper = document.createElement("div");
  wrapper.style.cssText = "display:flex;align-items:stretch;gap:0.5rem";

  const container = document.createElement("div");
  container.style.position = "relative";
  container.style.width = totalW + "px";
  container.style.height = totalH + "px";
  wrapper.appendChild(container);

  const canvas = document.createElement("canvas");
  canvas.width = totalW;
  canvas.height = totalH;
  canvas.style.width = totalW + "px";
  canvas.style.height = totalH + "px";
  canvas.style.display = "block";
  container.appendChild(canvas);

  const svg = d3.select(container).append("svg")
    .attr("width", totalW)
    .attr("height", totalH)
    .style("position", "absolute")
    .style("top", 0)
    .style("left", 0)
    .style("pointer-events", "none");

  const ctx = canvas.getContext("2d");
  const colorScale = getColorScale(key, grid);

  for (let i = 0; i < nRows; i++) {
    for (let j = 0; j < nCols; j++) {
      ctx.fillStyle = colorScale(grid[i][j]);
      ctx.fillRect(margin.left + j * cellSize, margin.top + i * cellSize, cellSize, cellSize);
    }
  }

  // Red square on current (row, col)
  if (state.row < nRows && state.col < nCols) {
    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = 2;
    ctx.strokeRect(
      margin.left + state.col * cellSize + 1,
      margin.top + state.row * cellSize + 1,
      cellSize - 2, cellSize - 2
    );
  }

  const g = svg.append("g");
  const xStep = nCols > 30 ? Math.ceil(nCols / 15) : (nCols > 14 ? 2 : 1);
  const yStep = nRows > 30 ? Math.ceil(nRows / 15) : (nRows > 14 ? 2 : 1);

  for (let j = 0; j < nCols; j += xStep) {
    g.append("text")
      .attr("class", "axis-label-x")
      .attr("x", margin.left + j * cellSize + cellSize / 2)
      .attr("y", margin.top + plotH + 12)
      .attr("text-anchor", "end")
      .attr("transform", `rotate(-45, ${margin.left + j * cellSize + cellSize / 2}, ${margin.top + plotH + 12})`)
      .text(nums[j]);
  }
  for (let i = 0; i < nRows; i += yStep) {
    g.append("text")
      .attr("class", "axis-label-y")
      .attr("x", margin.left - 6)
      .attr("y", margin.top + i * cellSize + cellSize / 2 + 3)
      .attr("text-anchor", "end")
      .text(inps[i]);
  }

  // Vertical colorbar
  const legendDiv = document.createElement("div");
  legendDiv.style.cssText = "display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:" + margin.top + "px;padding-bottom:" + margin.bottom + "px";
  const domain = colorScale.domain();
  const lo = domain[0], hi = domain[domain.length - 1];

  const maxSpan = document.createElement("span");
  maxSpan.style.cssText = "font-size:0.7rem;color:#666;margin-bottom:0.2rem";
  maxSpan.textContent = hi.toFixed(2);

  const legendCanvas = document.createElement("canvas");
  const legendH = plotH;
  legendCanvas.width = 14; legendCanvas.height = legendH;
  legendCanvas.style.cssText = "border:1px solid #ddd;border-radius:2px";
  const lctx = legendCanvas.getContext("2d");
  for (let i = 0; i < legendH; i++) {
    lctx.fillStyle = colorScale(hi + (lo - hi) * (i / (legendH - 1)));
    lctx.fillRect(0, i, 14, 1);
  }
  const minSpan = document.createElement("span");
  minSpan.style.cssText = "font-size:0.7rem;color:#666;margin-top:0.2rem";
  minSpan.textContent = lo.toFixed(2);

  legendDiv.appendChild(maxSpan);
  legendDiv.appendChild(legendCanvas);
  legendDiv.appendChild(minSpan);
  wrapper.appendChild(legendDiv);

  section.appendChild(wrapper);
  parentEl.appendChild(section);
}

// ── Event wiring ──
function wireEvents() {
  document.getElementById("task-select").addEventListener("change", async (e) => {
    state.task = e.target.value;
    applyTaskDefaults(state.task);
    document.getElementById("circles-grid").innerHTML =
      '<div class="loading" style="grid-column: 1 / -1">Loading data&hellip;</div>';
    await loadTaskData(state.task);
    populatePromptDropdowns();
    updatePromptDisplay();
    renderAllCircles();
    renderHeatmapSection();
  });

  document.getElementById("inp-select").addEventListener("change", (e) => {
    state.row = parseInt(e.target.value);
    updatePromptDisplay();
    renderAllCircles();
    if (state.selectedNeuron !== null) renderHeatmapSection();
  });

  document.getElementById("num-select").addEventListener("change", (e) => {
    state.col = parseInt(e.target.value);
    updatePromptDisplay();
    renderAllCircles();
    if (state.selectedNeuron !== null) renderHeatmapSection();
  });

}

// ── Init ──
async function init() {
  await loadNeuronsData();
  populateTaskDropdown();
  await loadTaskData(state.task);
  applyTaskDefaults(state.task);
  populatePromptDropdowns();
  wireEvents();
  updatePromptDisplay();
  renderAllCircles();
  renderHeatmapSection();
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.taskDataCache[state.task]) {
      renderAllCircles();
      if (state.selectedNeuron !== null) renderHeatmapSection();
    }
  }, 150);
});

init();
</script>
