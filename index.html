<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Months Dials &mdash; Llama-3.1-8B</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  max-width: 900px;
  margin: 0 auto;
  padding: 1.25rem 1.5rem 4rem;
  color: #333;
  background: #fafaf8;
  line-height: 1.6;
}

/* Top-level layout: knob | offset | prompt on row 1, dials full-width on row 2, sum/output on row 3 */
.layout {
  display: grid;
  grid-template-columns: 220px auto 1fr;
  grid-template-rows: auto auto auto;
  gap: 1rem 1.25rem;
  align-items: start;
  margin-top: 1rem;
}
.input-knob-wrap    { grid-column: 1; grid-row: 1; }
.offset-box-wrap    { grid-column: 2; grid-row: 1; }
.prompt-wrap        { grid-column: 3; grid-row: 1; align-self: center; margin-left: 1rem; }

/* Wrapper around .input-knob-wrap + .offset-box-wrap. Transparent on desktop —
   its children are direct grid items. On mobile (see media query below) it
   switches to flex so the two boxes sit side by side. */
.input-offset-wrap  { display: contents; }
.mobile-down-flow   { display: none; }   /* desktop hides the mobile-only vertical arrow */
.circles-section    { grid-column: 1 / -1; grid-row: 2; }
.bottom-row         { grid-column: 1 / -1; grid-row: 3;
                      display: flex; align-items: center;
                      justify-content: flex-start; gap: 0; }

/* Offset box: sits to the right of the input circle and also feeds into the addition module. */
.offset-box-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  align-self: flex-end;   /* hug the bottom of row 1 so its arrow lines up with the input's */
}
.offset-box {
  border: 2px solid #8b7355;
  border-radius: 6px;
  background: #fbfaf6;
  padding: 0.6rem 1.2rem;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 1.2rem;
  color: #333;
  white-space: nowrap;
}

/* Sum box: sits under the input column; receives the dials-box down-arrow,
   and emits the right-arrow toward the output circle. */
.sum-box-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  align-self: flex-start;   /* hug the top of the row, near the dials box */
  width: 220px;             /* matches the input column width */
  flex-shrink: 0;
}
.sum-box {
  border: 2px solid #8b7355;
  border-radius: 6px;
  background: #fbfaf6;
  padding: 0.7rem 1.2rem;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 1.2rem;
  color: #333;
  white-space: nowrap;
}
.sum-box strong { color: #8b7355; }

/* Italic caption below the sum box. */
.sum-box-label {
  font-style: italic;
  font-size: 0.85rem;
  color: #666;
  text-align: center;
  margin-top: 0.4rem;
}

/* Wrap around the horizontal arrow with an italic caption below it. */
.right-arrow-wrap {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 60px;
  margin: 93px 0.5rem 0 2rem;     /* top margin lines up the arrow with the output circle's center */
  align-self: flex-start;
}
.right-arrow-label {
  font-style: italic;
  font-size: 1.0rem;
  color: #666;
  text-align: center;
  margin-top: 0.35rem;
}

/* Horizontal arrow from sum box → output circle. Line stretches to fill the gap. */
.flow-arrow-right {
  display: flex;
  align-items: center;
}
.flow-arrow-right .arrow-line {
  flex: 1;
  height: 2.5px;
  background: #8b7355;
}
.flow-arrow-right .arrow-head {
  width: 0;
  height: 0;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
  border-left: 12px solid #8b7355;
}

/* Italic label above the prompt box. */
.prompt-label {
  font-style: italic;
  font-size: 1.0rem;
  color: #666;
  margin: 0 0 0.3rem 0.2rem;
}

/* Prompt display */
.prompt-display {
  padding: 0.75rem 1rem;
  background: #f5f5f0;
  border-left: 3px solid #8b7355;
  border-radius: 0 4px 4px 0;
}
.prompt-display .prompt-text {
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 0.88rem;
  white-space: pre-wrap;
  margin-bottom: 0.3rem;
  color: #333;
}
.prompt-display .prompt-meta {
  font-size: 0.8rem;
  color: #777;
}
.prompt-display .prompt-meta strong { color: #555; }

/* Knob / output circle wrappers */
.input-knob-wrap, .output-circle-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}
#input-knob, #output-circle {
  display: block;
  touch-action: none;
}
#input-knob { cursor: grab; }
#input-knob:active { cursor: grabbing; }
.knob-dot { fill: #c9c4b7; }
#input-knob-handle {
  fill: #8b7355;
  stroke: #fff;
  stroke-width: 2;
  pointer-events: none;
}
#output-circle-indicator {
  fill: #8b7355;
  stroke: #fff;
  stroke-width: 2;
}
.knob-label {
  text-align: center;
  font-size: 0.9rem;
  color: #555;
  margin-bottom: 0.2rem;
  font-family: 'Menlo', 'Consolas', monospace;
}
/* Input + output month labels each sit in a brown-bordered box, matching the offset box. */
#input-knob-label, #output-circle-label {
  border: 2px solid #8b7355;
  border-radius: 6px;
  background: #fbfaf6;
  padding: 0.6rem 1.2rem;
  font-size: 1.2rem;
  color: #333;
  white-space: nowrap;
}
#output-circle-label {
  margin-top: 0.5rem;
  margin-bottom: 0.3rem;
}

/* Italic "Model Prediction" caption below the output circle. */
.output-prediction-label {
  font-style: italic;
  font-size: 1.0rem;
  color: #666;
  text-align: center;
}
.knob-caption {
  text-align: center;
  font-size: 0.95rem;
  color: #999;
  font-style: italic;
  margin-bottom: 0.4rem;
}

/* Circles section title */
.circles-title {
  font-size: 1.05rem;
  font-weight: normal;
  color: #444;
  text-align: center;
  margin-top: 0.75rem;
  margin-bottom: 0.35rem;
  border-bottom: 1px solid #e4e1d8;
  padding-bottom: 0.4rem;
}
.circles-legend {
  font-size: 0.8rem;
  font-style: italic;
  color: #999;
  text-align: center;
  margin-bottom: 0.75rem;
}

/* Box around the dials section. */
.circles-section {
  border: 2px solid #8b7355;
  border-radius: 8px;
  background: #fbfaf6;
  padding: 0 0.6rem 0.4rem;
  overflow: hidden;            /* keep the title bar's color inside the rounded corners */
}

/* Brown title bar at the top of the dials box. */
.circles-title-bar {
  background: #8b7355;
  color: #fbfaf6;
  font-size: 0.9rem;
  font-family: 'Menlo', 'Consolas', monospace;
  padding: 0.35rem 0.7rem;
  margin: 0 -0.6rem 0.5rem;
  text-align: center;
}
.circles-title-bar strong { color: #fff; }

/* Dials grid — single row of 4 (T=2, T=5, T=10, T=50). */
.circles-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem 0.4rem;
  margin: 0;
}

/* Flow arrow connecting input → dials box → output. */
.flow-arrow {
  display: block;
  margin: 0.35rem auto 0;
}
/* The dials → sum-box arrow bridges a much taller vertical gap, so it sits
   flush with the top of its wrap and runs all the way down to the box. */
.sum-down-arrow {
  margin-top: 0;
  margin-bottom: 0.2rem;
}
.circle-cell {
  text-align: center;
  min-width: 0;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 0.25rem 0.15rem;
}
.circle-cell h4 {
  font-size: 0.75rem;
  font-weight: normal;
  color: #666;
  margin-bottom: 0.05rem;
  font-family: 'Menlo', 'Consolas', monospace;
}
.circle-cell .circle-residue {
  font-size: 0.7rem;
  color: #999;
  margin-bottom: 0.15rem;
  font-family: 'Menlo', 'Consolas', monospace;
}
.circle-cell .circle-residue strong { color: #444; }
.circle-cell svg {
  width: 100%;
  height: auto;
  display: block;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 5px 9px;
  border-radius: 4px;
  font-size: 0.78rem;
  font-family: 'Menlo', 'Consolas', monospace;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
  display: none;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 180px;
  color: #999;
  font-style: italic;
}

/* Responsive — mobile-friendly vertical stack. */
@media (max-width: 620px) {
  body { padding: 0.75rem 0.75rem 2rem; }
  h1 { font-size: 1.3rem; }

  /* Stack everything vertically: prompt, inputs, dials, sum, output. */
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto;
    gap: 0.9rem;
  }
  .prompt-wrap {
    grid-column: 1; grid-row: 1;
    margin-left: 0;
    align-self: stretch;
  }
  .input-offset-wrap {
    grid-column: 1; grid-row: 2;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    justify-content: center;
    gap: 0.75rem 1rem;
  }
  .circles-section { grid-column: 1; grid-row: 3; justify-self: stretch; }
  .bottom-row {
    grid-column: 1; grid-row: 4;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  /* Centre the sum-box-wrap + its down-arrow under the dials box. */
  .sum-box-wrap { width: auto; align-self: center; }

  /* Swap horizontal arrow for the mobile vertical one. */
  .right-arrow-wrap { display: none; }
  .mobile-down-flow {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mobile-down-label {
    font-style: italic;
    font-size: 0.95rem;
    color: #666;
    text-align: center;
    margin-top: 0.35rem;
    max-width: 260px;
  }

  /* Centre the output circle column. */
  .output-circle-wrap { align-self: center; }

  /* Dials grid: 2×2 on phones. */
  .circles-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="layout">

  <!-- Input + offset wrapper. Transparent on desktop (display: contents), becomes
       a flex row on mobile so the two boxes sit snugly side by side. -->
  <div class="input-offset-wrap">

  <!-- Input knob: drag the handle to rotate through 12 months. -->
  <div class="input-knob-wrap">
    <div class="knob-caption">drag to change input month</div>
    <div class="knob-label" id="input-knob-label">&nbsp;</div>
    <svg id="input-knob" viewBox="0 0 220 220" width="200" height="200">
      <!-- Drop a period-12 month-input activations plot at images/input_circle.png. -->
      <image id="input-knob-image" href="images/input_circle.png"
             x="20" y="20" width="180" height="180"
             preserveAspectRatio="xMidYMid meet" />
      <g id="input-knob-dots"></g>

    <svg class="flow-arrow" width="24" height="36" viewBox="0 0 24 36" aria-hidden="true">
      <line x1="12" y1="0" x2="12" y2="28" stroke="#8b7355" stroke-width="2.5" />
      <polygon points="5,25 19,25 12,36" fill="#8b7355" />
    </svg>
  </div>

  <!-- Offset box: feeds the offset/number value into the addition module. -->
  <div class="offset-box-wrap">
    <div class="knob-caption">offset</div>
    <div class="offset-box" id="offset-box">&nbsp;</div>
    <svg class="flow-arrow" width="24" height="36" viewBox="0 0 24 36" aria-hidden="true">
      <line x1="12" y1="0" x2="12" y2="28" stroke="#8b7355" stroke-width="2.5" />
      <polygon points="5,25 19,25 12,36" fill="#8b7355" />
    </svg>
  </div>

  </div><!-- /.input-offset-wrap -->

  <!-- Prompt with italic label above -->
  <div class="prompt-wrap">
    <div class="prompt-label">Prompt Input to Language Model</div>
    <div class="prompt-display" id="prompt-display">
      <div class="prompt-text" id="prompt-text"></div>
    </div>
  </div>

  <!-- Four Fourier dials in a single row (T = 2, 5, 10, 50). -->
  <div class="circles-section">
    <div class="circles-title-bar" id="dials-title">Addition Module</div>
    <div class="circles-grid" id="circles-grid">

    </div>

  <!-- Bottom row: sum box on the left (under the input column) connected to the

  <div class="bottom-row">

    <!-- Sum box: shows the addition the dials box just computed. -->
    <div class="sum-box-wrap">
      <svg class="flow-arrow sum-down-arrow" width="24" height="70" viewBox="0 0 24 70" aria-hidden="true">
        <line x1="12" y1="0" x2="12" y2="62" stroke="#8b7355" stroke-width="2.5" />
        <polygon points="5,59 19,59 12,70" fill="#8b7355" />
      </svg>
      <div class="sum-box" id="sum-box">April + five = <strong>9</strong></div>
      <div class="sum-box-label">MLP outputs the sum</div>
    </div>

    <!-- Mobile-only vertical arrow from sum box → output circle (replaces the horizontal arrow). -->
    <div class="mobile-down-flow" aria-hidden="true">
      <svg class="flow-arrow" width="24" height="60" viewBox="0 0 24 60">
        <line x1="12" y1="0" x2="12" y2="52" stroke="#8b7355" stroke-width="2.5" />
        <polygon points="5,49 19,49 12,60" fill="#8b7355" />
      </svg>
      <div class="mobile-down-label">Later layers map sum to a month</div>
    </div>

    <div class="right-arrow-wrap" aria-hidden="true">
      <div class="flow-arrow-right">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>
      <div class="right-arrow-label">Later layers map sum to a month</div>
    </div>

    <!-- Output circle: indicator snaps to predicted month. Drop a custom image at images/output_circle.png. -->
    <div class="output-circle-wrap">
      <svg id="output-circle" viewBox="0 0 220 220" width="200" height="200">
        <image id="output-circle-image" href="images/output_circle.png"
               x="20" y="20" width="180" height="180"
               preserveAspectRatio="xMidYMid meet" />
        <g id="output-circle-dots"></g>
        <circle id="output-circle-indicator" r="9" />
      </svg>
      <div class="knob-label" id="output-circle-label">&nbsp;</div>
      <div class="output-prediction-label">Model Prediction</div>
    </div>

  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Tweak this constant to change the offset/number value. ──
// Index into months.json's "nums" list. 0 = "one", 4 = "five", etc.
const FIXED_COL = 5;

// ── State ──
const state = {
  row: 7,            // initial input-month index (7 = August)
  taskData: null,
  neuronsData: null,
};

const MOD_ORDER = ["mod_2", "mod_5", "mod_10", "mod_50"];
const SVG_NS = "http://www.w3.org/2000/svg";

// ── Data loading ──
async function loadNeuronsData() {
  const resp = await fetch("data/neurons.json");
  state.neuronsData = await resp.json();
}

async function loadTaskData() {
  const resp = await fetch("data/months.json");
  state.taskData = await resp.json();
}

// ── Word-to-number parser ──
const _ones = {one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9};
const _teens = {ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19};
const _tens = {twenty:20,thirty:30,forty:40,fifty:50};

function parseNum(s) {
  const n = parseInt(s);
  if (!isNaN(n)) return n;
  if (_ones[s]) return _ones[s];
  if (_teens[s]) return _teens[s];
  if (_tens[s]) return _tens[s];
  const parts = s.split('-');
  if (parts.length === 2) return (_tens[parts[0]] || 0) + (_ones[parts[1]] || 0);
  return NaN;
}

// ── Answer for the current (row, FIXED_COL) cell ──
function getAnswer(row, col) {
  const { inps, nums } = state.taskData;
  const numVal = parseNum(nums[col]);
  const inpNum = row + 1;
  const sum = inpNum + numVal;
  const answerLabel = inps[(row + numVal) % 12];
  return { answerLabel, inpNum, numVal, sum };
}

// ── Prompt display ──
function updatePromptDisplay() {
  const { inps, nums } = state.taskData;
  const inp = inps[state.row];
  const num = nums[FIXED_COL];
  const template = state.neuronsData.templates.months;
  const prompt = template.replace("{input}", inp).replace("{number}", num);
  const answer = getAnswer(state.row, FIXED_COL);

  document.getElementById("prompt-text").textContent = prompt;
  document.getElementById("offset-box").textContent = num;
  document.getElementById("dials-title").innerHTML =
    `Layer 18 MLP: Calculating ${inp} + ${num} = <strong>${answer.sum}</strong>`;
  document.getElementById("sum-box").innerHTML =
    `${inp} + ${num} = <strong>${answer.sum}</strong>`;
}

// ── Input / output ring geometry (12 evenly-spaced positions) ──
// Tweak these to align each dial ring with the circle drawn in its image.
// SVG viewBox is 220×220, so the center is at (110, 110).
const KNOB_CENTER = 110;
const INPUT_KNOB_RADIUS  = 90;  // radius of the input dial's 12-dot ring.
const OUTPUT_KNOB_RADIUS = 60;  // radius of the output dial's 12-dot ring.
const IMG_INSET = 0;        // padding around the background image inside the SVG.
                            //   0  -> image fills the full 220×220 viewBox (largest).
                            //   20 -> 20-px margin on each side (smaller image).
                            //   Use a NEGATIVE value to zoom the image past the viewBox
                            //   (clipped to the SVG edges) -- useful if your plot has
                            //   extra whitespace around the circle.

// Position the background images for both knobs from the constants above.
function applyImageInset() {
  const size = 220 - 2 * IMG_INSET;
  ["input-knob-image", "output-circle-image"].forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute("x", IMG_INSET);
    el.setAttribute("y", IMG_INSET);
    el.setAttribute("width", size);
    el.setAttribute("height", size);
  });
}

// θ(i) = 2π·i/12 — January (0) at 3 o'clock (angle 0), going counter-clockwise.
// Matches the Fourier-dial residue convention: residue 0 sits at the right.
function monthAngle(i) { return (2 * Math.PI * i) / 12; }
function monthXY(i, r) {
  const a = monthAngle(i);
  return [KNOB_CENTER + r * Math.cos(a), KNOB_CENTER - r * Math.sin(a)];
}

function renderRingDots(groupId, radius) {
  const g = document.getElementById(groupId);
  g.innerHTML = "";
  for (let i = 0; i < 12; i++) {
    const [x, y] = monthXY(i, radius);
    const c = document.createElementNS(SVG_NS, "circle");
    c.setAttribute("cx", x);
    c.setAttribute("cy", y);
    c.setAttribute("r", 4);
    c.setAttribute("class", "knob-dot");
    g.appendChild(c);
  }
}

function positionKnobHandle() {
  const handle = document.getElementById("input-knob-handle");
  const [x, y] = monthXY(state.row, INPUT_KNOB_RADIUS);
  handle.setAttribute("cx", x);
  handle.setAttribute("cy", y);
  document.getElementById("input-knob-label").textContent =
    state.taskData.inps[state.row];
}

function updateOutputCircle() {
  const numVal = parseNum(state.taskData.nums[FIXED_COL]);
  const ansIdx = (state.row + numVal) % 12;
  const [x, y] = monthXY(ansIdx, OUTPUT_KNOB_RADIUS);
  const ind = document.getElementById("output-circle-indicator");
  ind.setAttribute("cx", x);
  ind.setAttribute("cy", y);
  document.getElementById("output-circle-label").textContent =
    state.taskData.inps[ansIdx];
}

function setMonth(idx) {
  state.row = idx;
  positionKnobHandle();
  updatePromptDisplay();
  renderAllCircles();
  updateOutputCircle();
}

// ── Knob drag interaction ──
function wireKnobDrag() {
  const svg = document.getElementById("input-knob");
  let dragging = false;

  function setFromEvent(evt) {
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
    const dx = loc.x - KNOB_CENTER;
    const dy = loc.y - KNOB_CENTER;
    // SVG y grows downward, so negate it to get the math-convention angle
    // (CCW, with 0 = 3 o'clock = January).
    let theta = Math.atan2(-dy, dx);
    if (theta < 0) theta += 2 * Math.PI;
    const idx = Math.round((theta / (2 * Math.PI)) * 12) % 12;
    if (idx !== state.row) setMonth(idx);
  }

  svg.addEventListener("pointerdown", (e) => {
    dragging = true;
    svg.setPointerCapture(e.pointerId);
    setFromEvent(e);
  });
  svg.addEventListener("pointermove", (e) => {
    if (dragging) setFromEvent(e);
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    try { svg.releasePointerCapture(e.pointerId); } catch (_) {}
  }
  svg.addEventListener("pointerup", endDrag);
  svg.addEventListener("pointercancel", endDrag);
}

// ── Fourier dial rendering (ported from demo_draft2) ──
const CIRCLE_SIZE = 200;
const CIRCLE_MARGIN = 18;
const CIRCLE_REF_RADIUS = (CIRCLE_SIZE - 2 * CIRCLE_MARGIN) / 2 * 0.85;
const neuronColors = d3.schemeTableau10;

function renderCircleForMod(svgEl, modKey) {
  const svg = d3.select(svgEl);
  svg.selectAll("*").remove();
  svg.attr("viewBox", `0 0 ${CIRCLE_SIZE} ${CIRCLE_SIZE}`)
     .attr("preserveAspectRatio", "xMidYMid meet");

  const nd = state.neuronsData;
  const taskData = state.taskData;
  const T = parseInt(modKey.split("_")[1]);
  const groupNeurons = nd.neurons_by_modulo[modKey] || [];
  const downproj = nd.downproj[modKey] || {};

  const cx = CIRCLE_SIZE / 2;
  const cy = CIRCLE_SIZE / 2;
  const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

  // Probe axes (faint cosine/sine cross behind the unit circle).
  const axisExt = CIRCLE_REF_RADIUS + 28;
  [
    { x1: -axisExt, y1: 0, x2: axisExt, y2: 0 },
    { x1: 0, y1: -axisExt, x2: 0, y2: axisExt },
  ].forEach(a => {
    g.append("line")
      .attr("x1", a.x1).attr("y1", a.y1).attr("x2", a.x2).attr("y2", a.y2)
      .attr("stroke", "#ececec").attr("stroke-width", 0.8);
  });

  // Reference unit circle
  g.append("circle")
    .attr("r", CIRCLE_REF_RADIUS)
    .attr("fill", "none")
    .attr("stroke", "#ddd")
    .attr("stroke-width", 1);

  // Residue markers; sparser labels for larger T.
  const markerR = T > 20 ? 1.2 : 2.2;
  function showLabel(r) {
    if (T <= 10) return true;
    if (T === 20) return r % 2 === 0;
    if (T === 50) return r % 5 === 0;
    if (T === 100) return r % 10 === 0;
    return r === 0;
  }
  for (let r = 0; r < T; r++) {
    const angle = (2 * Math.PI * r) / T;
    const mx = CIRCLE_REF_RADIUS * Math.cos(angle);
    const my = -CIRCLE_REF_RADIUS * Math.sin(angle);
    g.append("circle")
      .attr("cx", mx).attr("cy", my)
      .attr("r", markerR)
      .attr("fill", "#bbb")
      .attr("stroke", "#999")
      .attr("stroke-width", 0.4);
    if (showLabel(r)) {
      const labelR = CIRCLE_REF_RADIUS + 11;
      g.append("text")
        .attr("x", labelR * Math.cos(angle))
        .attr("y", -labelR * Math.sin(angle))
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("font-size", "10.5px")
        .attr("fill", "#888")
        .text(r);
    }
  }

  // Ground-truth star at sum mod T
  const answer = getAnswer(state.row, FIXED_COL);
  const residue = answer.sum % T;
  const starAngle = (2 * Math.PI * residue) / T;
  const starX = CIRCLE_REF_RADIUS * Math.cos(starAngle);
  const starY = -CIRCLE_REF_RADIUS * Math.sin(starAngle);
  const sr = 4.5;
  let starPath = "";
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + (Math.PI * i / 5);
    const rd = i % 2 === 0 ? sr : sr * 0.4;
    const px = starX + rd * Math.cos(a);
    const py = starY + rd * Math.sin(a);
    starPath += (i === 0 ? "M" : "L") + px + "," + py;
  }
  starPath += "Z";
  g.append("path")
    .attr("d", starPath)
    .attr("fill", "#999")
    .attr("stroke", "#666")
    .attr("stroke-width", 0.4);

  // Arrowhead defs (one per palette color)
  const defs = svg.append("defs");
  neuronColors.forEach((color, i) => {
    defs.append("marker")
      .attr("id", `arrowhead-${modKey}-${i}`)
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 8).attr("refY", 5)
      .attr("markerWidth", 4.5).attr("markerHeight", 4.5)
      .attr("orient", "auto-start-reverse")
      .append("path")
      .attr("d", "M 0 0 L 10 5 L 0 10 z")
      .attr("fill", color);
  });

  // Gather per-neuron arrows.
  const vectors = [];
  let sumC = 0, sumS = 0;
  groupNeurons.forEach((nid, idx) => {
    const coords = downproj[String(nid)];
    if (!coords) return;
    const [c, s] = coords;
    const neuronActs = taskData.neurons[String(nid)];
    const activation = neuronActs ? neuronActs.both[state.row][FIXED_COL] : 0;
    const sc = c * activation;
    const ss = s * activation;
    sumC += sc;
    sumS += ss;
    vectors.push({ nid, sc, ss, activation, idx, mag: Math.sqrt(sc * sc + ss * ss) });
  });

  // Smallest arrows first so large ones sit on top.
  vectors.sort((a, b) => a.mag - b.mag);
  const scale = CIRCLE_REF_RADIUS;

  vectors.forEach(v => {
    if (v.mag < 1e-6) return;
    const ex = v.sc * scale;
    const ey = -v.ss * scale;
    const color = neuronColors[v.idx % neuronColors.length];

    const arrow = g.append("line")
      .attr("class", `arrow arrow-${v.nid}`)
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", ex).attr("y2", ey)
      .attr("stroke", color)
      .attr("stroke-width", 1.5)
      .attr("opacity", 0.85)
      .attr("marker-end", `url(#arrowhead-${modKey}-${v.idx % neuronColors.length})`);

    // Wider transparent hit-line for hover tooltip.
    const hit = g.append("line")
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", ex).attr("y2", ey)
      .attr("stroke", "transparent")
      .attr("stroke-width", 14)
      .style("cursor", "default");

    hit.on("mouseenter", (event) => {
      arrow.attr("stroke-width", 2.5).attr("opacity", 1.0);
      g.selectAll(".arrow").each(function() {
        const el = d3.select(this);
        if (!el.classed(`arrow-${v.nid}`)) el.attr("opacity", 0.18);
      });
      const tip = document.getElementById("tooltip");
      tip.innerHTML = `<b>Neuron ${v.nid}</b> &middot; Period ${modKey.replace("mod_", " ")}<br>act: ${v.activation.toFixed(3)}`;
      tip.style.left = (event.pageX + 14) + "px";
      tip.style.top = (event.pageY - 36) + "px";
      tip.style.display = "block";
    });
    hit.on("mousemove", (event) => {
      const tip = document.getElementById("tooltip");
      tip.style.left = (event.pageX + 14) + "px";
      tip.style.top = (event.pageY - 36) + "px";
    });
    hit.on("mouseleave", () => {
      document.getElementById("tooltip").style.display = "none";
      renderCircleForMod(svgEl, modKey);
    });
  });

  // Sum vector (dashed), terminating in a brown dot like the input knob handle.
  const sumEx = sumC * scale;
  const sumEy = -sumS * scale;
  if (Math.abs(sumC) > 1e-6 || Math.abs(sumS) > 1e-6) {
    g.append("line")
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", sumEx).attr("y2", sumEy)
      .attr("stroke", "#333")
      .attr("stroke-width", 1.4)
      .attr("stroke-dasharray", "3,2")
      .attr("opacity", 0.7)
      .style("pointer-events", "none");
    g.append("circle")
      .attr("cx", sumEx).attr("cy", sumEy)
      .attr("r", 5)
      .attr("fill", "#8b7355")
      .attr("stroke", "#fff")
      .attr("stroke-width", 1.5)
      .style("pointer-events", "none");
  }
}

function renderAllCircles() {
  const grid = document.getElementById("circles-grid");
  grid.innerHTML = "";
  const answer = state.taskData ? getAnswer(state.row, FIXED_COL) : null;
  MOD_ORDER.forEach(modKey => {
    const T = parseInt(modKey.split("_")[1]);
    const cell = document.createElement("div");
    cell.className = "circle-cell";
    const title = document.createElement("h4");
    title.textContent = `T = ${T}`;
    cell.appendChild(title);
    if (answer) {
      const sub = document.createElement("div");
      sub.className = "circle-residue";
      // sub.innerHTML = `${answer.sum} mod ${T} = <strong>${answer.sum % T}</strong>`;
      cell.appendChild(sub);
    }
    const svg = document.createElementNS(SVG_NS, "svg");
    cell.appendChild(svg);
    grid.appendChild(cell);
    renderCircleForMod(svg, modKey);
  });
}

// ── Init ──
async function init() {
  await Promise.all([loadNeuronsData(), loadTaskData()]);
  applyImageInset();
  renderRingDots("input-knob-dots", INPUT_KNOB_RADIUS);
  renderRingDots("output-circle-dots", OUTPUT_KNOB_RADIUS);
  positionKnobHandle();
  wireKnobDrag();
  updatePromptDisplay();
  renderAllCircles();
  updateOutputCircle();
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.taskData) renderAllCircles();
  }, 150);
});

init();
</script>
